<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gifts and Revelations for Rose and Her Bud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #282828;
    --paper: #f5cac3;
    --paper-deep: #f5cac3;
    --glow: #282828;
    --glow-soft: #d98aa0;
    --muted: #282828;
    --line: #f0a8bd;
    --card-bg: #FAE7E4;
    /* fluid crystal-ball size: scales with viewport, fits both axes */
    --ball: clamp(220px, min(70vw, 60vh), 560px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    background: #f5cac3;
    color: var(--ink);
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.25rem;
    overflow-x: hidden;
  }

  .frame {
    width: 100%;
    max-width: 600px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Mencken Std Head Narrow', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 100%;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 2.5rem;
    display: inline-block;
  }

  .eyebrow .line1 {
    display: block;
    white-space: nowrap;
  }
  .eyebrow .line2 {
    display: block;
    text-align: justify;
    text-align-last: justify;
  }

  .eyebrow .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--glow);
    margin: 0 0.5em;
    vertical-align: middle;
  }

  /* The crystal ball */
  .orb-wrap {
    position: relative;
    width: var(--ball);
    height: var(--ball);
    margin: 0 auto 2.75rem;
    /* hand cursor at rest, hovering near the ball */
    cursor: grab;
  }
  .orb-wrap:active { cursor: grabbing; }

  /* the glass sphere */
  .orb {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: var(--ball); height: var(--ball);
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 28%,
        rgba(255,255,255,0.55) 0%,
        rgba(206,224,232,0.32) 18%,
        rgba(120,150,168,0.22) 42%,
        rgba(60,86,104,0.30) 70%,
        rgba(28,44,58,0.45) 100%);
    box-shadow:
      inset 0 0 60px rgba(255,255,255,0.25),
      inset 0 -22px 50px rgba(20,34,46,0.5),
      0 22px 44px -16px rgba(40,40,60,0.45);
    backdrop-filter: blur(1px);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }

  /* highlight glint on the glass */
  .orb::before {
    content: "";
    position: absolute;
    top: 14%; left: 20%;
    width: 30%; height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.85), transparent 70%);
    filter: blur(2px);
    z-index: 4;
  }

  .orb-wrap:hover .orb { transform: translateX(-50%) translateY(-3px); }

  /* the swirling mist inside */
  .mist {
    position: absolute;
    width: 150%; height: 150%;
    background:
      radial-gradient(closest-side at 35% 40%, rgba(217,84,58,0.55), transparent 60%),
      radial-gradient(closest-side at 68% 60%, rgba(232,160,107,0.5), transparent 55%),
      radial-gradient(closest-side at 55% 30%, rgba(125,90,150,0.45), transparent 60%);
    opacity: 0.35;
    filter: blur(8px);
    z-index: 3;
    transition: opacity 0.5s ease;
  }
  .orb.spinning .mist { animation: swirl 1s linear; }
  @keyframes swirl {
    0%   { transform: rotate(0deg) scale(1);   opacity: 0.4; }
    50%  { transform: rotate(220deg) scale(1.25); opacity: 0.9; }
    100% { transform: rotate(420deg) scale(1);  opacity: 0.4; }
  }

  .orb .window {
    position: relative;
    z-index: 4;
    color: #282828;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(255,255,255,0.5);
    transition: opacity 0.4s ease;
    text-align: center;
  }

  /* gentle nudge on the whole ball as it reads the future */
  .orb.spinning { animation: gaze 1s ease; }
  @keyframes gaze {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(0); }
    25% { transform: translateX(-50%) translateY(-2px) rotate(-1.5deg); }
    75% { transform: translateX(-50%) translateY(-2px) rotate(1.5deg); }
  }

  /* the waving hand that appears near the ball */
  .hand {
    position: absolute;
    top: 38%;
    right: -14px;
    font-size: 3rem;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transform-origin: 70% 90%;
    transition: opacity 0.3s ease;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
  }
  .orb-wrap:hover .hand { opacity: 0.92; animation: wave 1.1s ease-in-out infinite; }
  .orb.spinning ~ .hand,
  .orb-wrap:has(.orb.spinning) .hand { opacity: 1; animation: wave 0.45s ease-in-out infinite; }
  @keyframes wave {
    0%,100% { transform: rotate(8deg); }
    50% { transform: rotate(-22deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb.spinning, .orb.spinning .mist, .hand { animation: none; }
    .orb { transition: none; }
  }

  /* The reveal card */
  .card {
    background: var(--card-bg);
    border: none;
    border-radius: 4px;
    padding: 2.25rem 1.75rem 2rem;
    box-shadow: 0 18px 40px -24px rgba(60,40,20,0.5);
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }

  .card.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .card .kind {
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--glow);
    margin-bottom: 1.25rem;
  }

  .card .body {
    font-size: 1.32rem;
    line-height: 1.5;
    font-weight: 400;
    color: var(--ink);
  }

  .card .intro {
    font-size: 1.32rem;
    line-height: 1.5;
    font-weight: 400;
    color: var(--ink);
    text-align: center;
    margin-bottom: 1.4rem;
  }

  .card .body em { font-style: italic; }

  .card .attribution {
    margin-top: 1.1rem;
    font-size: 0.95rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Poem: left-aligned verse with poet's name in bold at the bottom */
  .card[data-type="poem"] .body {
    text-align: left;
  }
  .card[data-type="poem"] .attribution {
    text-align: left;
    font-style: normal;
    color: var(--ink);
    margin-top: 1.4rem;
  }
  .card[data-type="poem"] .attribution strong {
    font-weight: 700;
  }

  .card a.listen {
    display: inline-block;
    margin-top: 1.6rem;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid var(--glow);
    padding-bottom: 3px;
    transition: color 0.2s, border-color 0.2s;
  }

  .card a.listen:hover { color: var(--glow); }

  .footnote {
    margin-top: 2.5rem;
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    min-height: 1em;
  }

  :focus-visible { outline: 2px solid var(--glow); outline-offset: 4px; border-radius: 3px; }

  .replay {
    display: block;
    margin: 1.4rem auto 0;
    background: none;
    border: 1px solid #E98E7D;
    border-radius: 999px;
    padding: 0.6rem 1.4rem;
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .replay:hover { color: #ffffff; border-color: #E98E7D; background: #E98E7D; }
</style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow"><span class="line1">Gifts and Revelations</span><span class="line2">For Rose and Her Bud</span></p>

    <div class="orb-wrap" id="orbWrap">
      <div class="orb" id="orb" role="button" tabindex="0" aria-label="Wave your hand to reveal today's draw">
        <div class="mist"></div>
        <div class="window" id="window">Wave to see</div>
      </div>
      <div class="hand" aria-hidden="true">👋</div>
    </div>

    <section class="card" id="card" aria-live="polite">
      <p class="kind" id="kind"></p>
      <p class="intro" id="intro"></p>
      <p class="body" id="cardBody"></p>
      <p class="attribution" id="attribution"></p>
      <a class="listen" id="listen" href="#" target="_blank" rel="noopener">Listen here ↗</a>
    </section>

    <p class="footnote" id="footnote"></p>
    <button class="replay" id="replay" type="button" hidden>Wave again</button>
  </main>

<script>
/* ============================================================
   YOUR CONTENT — edit this list.
   type: "song" | "quote" | "poem"
   - song:  { type:"song",  body:"Song title", attribution:"Artist", url:"https://open.spotify.com/track/..." }
   - quote: { type:"quote", body:"The quote text.", attribution:"Author" }
   - poem:  { type:"poem",  body:"Line one\nLine two\nLine three", attribution:"Poet" }
   Use \n inside body for line breaks (poems).
   ============================================================ */
const ENTRIES = [
  { type:"song",  body:"Such Great Heights", attribution:"The Postal Service", url:"https://open.spotify.com/track/0Am6Bb3GW7Bxlk2VsdH9Td" },
  { type:"quote", body:"The cure for anything is salt water — sweat, tears, or the sea.", attribution:"Isak Dinesen" },
  { type:"poem",  body:"I have no name:\nI am but two days old.\nWhat shall I call thee?\n\u201CI happy am,\nJoy is my name.\u201D\nSweet joy befall thee!\n\nPretty joy!\nSweet joy but two days old,\nSweet joy I call thee:\nThou dost smile,\nI sing the while,\nSweet joy befall thee!", attribution:"William Blake" },
  { type:"song",  body:"Dreams", attribution:"Fleetwood Mac", url:"https://open.spotify.com/track/0ofHAoxe9vBkTCp2UQIavz" },
  { type:"quote", body:"We are all in the gutter, but some of us are looking at the stars.", attribution:"Oscar Wilde" },
];

/* ============================================================
   No-repeat logic: shuffles the deck, deals one per calendar
   day, and reshuffles only after every entry has been shown.
   ============================================================ */
const KEY = "dailyDraw.v1";

function todayStamp() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function shuffledIndexes(n) {
  const a = Array.from({length:n}, (_,i)=>i);
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {}
}

/* Returns the entry index assigned to today, creating it once. */
function entryForToday() {
  let s = loadState();

  // Reset the deck if the content list size changed.
  if (s.size !== ENTRIES.length) s = {};

  if (s.date === todayStamp() && typeof s.todayIndex === "number") {
    return s.todayIndex; // already drawn today
  }

  // Need a fresh draw. Refill the deck if empty.
  if (!Array.isArray(s.deck) || s.deck.length === 0) {
    s.deck = shuffledIndexes(ENTRIES.length);
  }

  const todayIndex = s.deck.shift();

  saveState({
    size: ENTRIES.length,
    date: todayStamp(),
    todayIndex,
    deck: s.deck
  });

  return todayIndex;
}

const LABEL = { song:"The Crystal Ball Says", quote:"The Crystal Ball Says", poem:"The Crystal Ball Says" };

const orb = document.getElementById("orb");
const windowEl = document.getElementById("window");
const card = document.getElementById("card");
const kindEl = document.getElementById("kind");
const introEl = document.getElementById("intro");
const bodyEl = document.getElementById("cardBody");
const attrEl = document.getElementById("attribution");
const listenEl = document.getElementById("listen");
const footnote = document.getElementById("footnote");
const replayBtn = document.getElementById("replay");

let animating = false;

/* Plays the swirl, then fills the card with today's entry. */
function playReveal() {
  if (animating) return;
  animating = true;

  const idx = entryForToday();
  const entry = ENTRIES[idx];

  // hide the card while the ball swirls again
  card.classList.remove("show");
  orb.classList.add("spinning");
  windowEl.style.opacity = "0";

  setTimeout(() => {
    kindEl.textContent = LABEL[entry.type] || "Today";
    card.setAttribute("data-type", entry.type);

    if (entry.type === "song") {
      // Song: intro line + "Listen here" link, no quote body/attribution
      introEl.textContent = "Today's gift is in the form of a song.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "0";
      bodyEl.innerHTML = "";
      bodyEl.style.display = "none";
      attrEl.style.display = "none";
      if (entry.url) {
        listenEl.href = entry.url;
        listenEl.style.display = "inline-block";
      } else {
        listenEl.style.display = "none";
      }
    } else if (entry.type === "poem") {
      // Poem: intro line, left-aligned verse, poet in bold at the bottom
      introEl.textContent = "Today's gift is in the form of a poem.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "1.4rem";
      bodyEl.style.display = "block";
      bodyEl.innerHTML = (entry.body || "").replace(/\n/g, "<br>");
      attrEl.innerHTML = entry.attribution ? "<strong>" + entry.attribution + "</strong>" : "";
      attrEl.style.display = entry.attribution ? "block" : "none";
      listenEl.style.display = "none";
    } else {
      // Quote (default): intro line, centered body + italic em-dash attribution
      introEl.textContent = "Today's gift is in the form of a quote.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "1.4rem";
      bodyEl.style.display = "block";
      bodyEl.innerHTML = (entry.body || "").replace(/\n/g, "<br>");
      attrEl.innerHTML = entry.attribution ? "— " + entry.attribution : "";
      attrEl.style.display = entry.attribution ? "block" : "none";
      listenEl.style.display = "none";
    }

    card.classList.add("show");
    windowEl.textContent = "✦";
    windowEl.style.opacity = "1";
    footnote.textContent = "Come back tomorrow for the next one.";
    replayBtn.hidden = false;
  }, 1000);

  setTimeout(() => {
    orb.classList.remove("spinning");
    animating = false;
  }, 1000);
}

// Swirl when the cursor passes in front of the ball.
// pointerenter fires once per entry, so it won't loop while the cursor rests.
orb.addEventListener("pointerenter", playReveal);

// Click and keyboard still force a replay anytime.
orb.addEventListener("click", playReveal);
orb.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); playReveal(); }
});
replayBtn.addEventListener("click", playReveal);
</script>
</body>
</html>
