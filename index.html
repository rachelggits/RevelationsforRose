<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gifts and Revelations for Rose and Her Bud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #282828;
    --paper: #f5cac3;
    --paper-deep: #f5cac3;
    --glow: #282828;
    --glow-soft: #d98aa0;
    --muted: #282828;
    --line: #f0a8bd;
    --card-bg: #FAE7E4;
    --ball: clamp(220px, min(70vw, 60vh), 560px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    background: #f5cac3;
    color: var(--ink);
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.25rem;
    overflow-x: hidden;
  }

  @media (max-width: 600px) {
    body { padding-left: 1.9rem; padding-right: 1.9rem; }
    .card { padding-left: 1.5rem; padding-right: 1.5rem; }
  }

  .frame {
    width: 100%;
    max-width: 600px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Mencken Std Head Narrow', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: clamp(20px, 6.4vw, 30px);
    line-height: 100%;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 2.5rem;
    display: inline-block;
  }

  .eyebrow .line1 {
    display: block;
    white-space: nowrap;
  }
  .eyebrow .line2 {
    display: block;
    text-align: justify;
    text-align-last: justify;
  }

  .eyebrow .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--glow);
    margin: 0 0.5em;
    vertical-align: middle;
  }

  .orb-wrap {
    position: relative;
    width: var(--ball);
    height: var(--ball);
    margin: 0 auto 2.75rem;
    cursor: grab;
  }
  .orb-wrap:active { cursor: grabbing; }

  .orb {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: var(--ball); height: var(--ball);
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 28%,
        rgba(255,255,255,0.55) 0%,
        rgba(206,224,232,0.32) 18%,
        rgba(120,150,168,0.22) 42%,
        rgba(60,86,104,0.30) 70%,
        rgba(28,44,58,0.45) 100%);
    box-shadow:
      inset 0 0 60px rgba(255,255,255,0.25),
      inset 0 -22px 50px rgba(20,34,46,0.5),
      0 22px 44px -16px rgba(40,40,60,0.45);
    backdrop-filter: blur(1px);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }

  .orb::before {
    content: "";
    position: absolute;
    top: 14%; left: 20%;
    width: 30%; height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.85), transparent 70%);
    filter: blur(2px);
    z-index: 4;
  }

  .orb-wrap:hover .orb { transform: translateX(-50%) translateY(-3px); }

  .mist {
    position: absolute;
    width: 150%; height: 150%;
    background:
      radial-gradient(closest-side at 35% 40%, rgba(217,84,58,0.55), transparent 60%),
      radial-gradient(closest-side at 68% 60%, rgba(232,160,107,0.5), transparent 55%),
      radial-gradient(closest-side at 55% 30%, rgba(125,90,150,0.45), transparent 60%);
    opacity: 0.35;
    filter: blur(8px);
    z-index: 3;
    transition: opacity 0.5s ease;
  }
  .orb.spinning .mist { animation: swirl 1s linear; }
  @keyframes swirl {
    0%   { transform: rotate(0deg) scale(1);   opacity: 0.4; }
    50%  { transform: rotate(220deg) scale(1.25); opacity: 0.9; }
    100% { transform: rotate(420deg) scale(1);  opacity: 0.4; }
  }

  .orb .window {
    position: relative;
    z-index: 4;
    color: #282828;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(255,255,255,0.5);
    transition: opacity 0.4s ease;
    text-align: center;
  }

  .orb.spinning { animation: gaze 1s ease; }
  @keyframes gaze {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(0); }
    25% { transform: translateX(-50%) translateY(-2px) rotate(-1.5deg); }
    75% { transform: translateX(-50%) translateY(-2px) rotate(1.5deg); }
  }

  .hand {
    position: absolute;
    top: 38%;
    right: -14px;
    font-size: 3rem;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transform-origin: 70% 90%;
    transition: opacity 0.3s ease;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
  }
  .orb-wrap:hover .hand { opacity: 0.92; animation: wave 1.1s ease-in-out infinite; }
  .orb.spinning ~ .hand,
  .orb-wrap:has(.orb.spinning) .hand { opacity: 1; animation: wave 0.45s ease-in-out infinite; }
  @keyframes wave {
    0%,100% { transform: rotate(8deg); }
    50% { transform: rotate(-22deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb.spinning, .orb.spinning .mist, .hand { animation: none; }
    .orb { transition: none; }
  }

  .card {
    background: var(--card-bg);
    border: none;
    border-radius: 4px;
    padding: 2.25rem 1.75rem 2rem;
    box-shadow: 0 18px 40px -24px rgba(60,40,20,0.5);
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }

  .card.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .card .kind {
    font-family: 'Spline Sans Mono', monospace;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #761200;
    margin-bottom: 1.25rem;
  }

  .card .body {
    font-size: 1.32rem;
    line-height: 1.5;
    font-weight: 400;
    color: var(--ink);
  }

  .card .intro {
    font-size: 16px;
    line-height: 1.5;
    font-weight: 400;
    color: #282828;
    text-align: center;
    margin-bottom: 1.4rem;
  }

  .card .body em { font-style: italic; }

  .card .attribution {
    margin-top: 1.1rem;
    font-size: 0.95rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Poem: left-aligned verse with poet's name in bold at the bottom */
  .card[data-type="poem"] .body {
    text-align: left;
    line-height: 110%;
  }
  .card[data-type="poem"] .attribution {
    text-align: left;
    font-style: normal;
    color: var(--ink);
    margin-top: 1rem;
    font-size: 18px;
    line-height: 110%;
  }
  .card[data-type="poem"] .attribution strong {
    font-weight: 700;
  }

  /* Quote: left-aligned text; author in bold below the quote */
  .card[data-type="quote"] .body {
    text-align: left;
    line-height: 110%;
  }
  .card[data-type="quote"] .attribution {
    text-align: left;
    margin-top: 1rem;
    font-style: normal;
    color: var(--ink);
    font-size: 18px;
    line-height: 110%;
  }
  .card[data-type="quote"] .attribution strong {
    font-weight: 700;
  }

  .card a.listen {
    display: inline-block;
    margin-top: 1.6rem;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid var(--glow);
    padding-bottom: 3px;
    transition: color 0.2s, border-color 0.2s;
  }

  .card a.listen:hover { color: var(--glow); }

  .footnote {
    margin-top: 2.5rem;
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    min-height: 1em;
  }

  :focus-visible { outline: 2px solid var(--glow); outline-offset: 4px; border-radius: 3px; }

  .replay {
    display: block;
    margin: 1.4rem auto 0;
    background: none;
    border: 1px solid #E98E7D;
    border-radius: 999px;
    padding: 0.6rem 1.4rem;
    font-family: 'Mencken Std Text', 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .replay:hover { color: #ffffff; border-color: #E98E7D; background: #E98E7D; }
</style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow"><span class="line1">Gifts and Revelations</span><span class="line2">For Rose and Her Bud</span></p>

    <div class="orb-wrap" id="orbWrap">
      <div class="orb" id="orb" role="button" tabindex="0" aria-label="Wave your hand to reveal today's draw">
        <div class="mist"></div>
        <div class="window" id="window">Wave to see</div>
      </div>
      <div class="hand" aria-hidden="true">👋</div>
    </div>

    <section class="card" id="card" aria-live="polite">
      <p class="kind" id="kind"></p>
      <p class="intro" id="intro"></p>
      <p class="body" id="cardBody"></p>
      <p class="attribution" id="attribution"></p>
      <a class="listen" id="listen" href="#" target="_blank" rel="noopener">Listen here ↗</a>
    </section>

    <p class="footnote" id="footnote"></p>
    <button class="replay" id="replay" type="button" hidden>Wave again</button>
  </main>

<script>
/* ============================================================
   YOUR CONTENT — edit this list.
   - song:  { type:"song",  url:"https://open.spotify.com/track/..." }
   - quote: { type:"quote", body:"The quote text.", attribution:"Author" }
   - poem:  { type:"poem",  body:"Line one\nLine two", attribution:"Poet" }
   Use \n for line breaks, \n\n for a blank line between stanzas.
   ============================================================ */
const ENTRIES = [
  { type:"poem", title:"Why I Wake Early", body:"Hello, sun in my face.\nHello, you who make the morning\nand spread it over the fields\nand into the faces of the tulips\nand the nodding morning glories,\nand into the windows of, even, the\nmiserable and the crotchety-\nbest preacher that ever was,\nclear star, that just happens\nto be where you are in the universe\nto keep us from ever-darkness,\nto ease us with warm touching,\nto hold us in the great hands of light –\ngood morning, good morning, good morning.\nWatch now, how I start the day\nIn happiness, in kindness.", attribution:"Mary Oliver" },
  { type:"poem", title:"A Center", body:"You must hold your quiet center,\nwhere you do what only you can do.\nIf others call you a maniac or a fool,\njust let them wag their tongues.\nIf some praise your perseverance,\ndon't feel too happy about it—\nonly solitude is a lasting friend.\n\nYou must hold your distant center.\nDon't move even if earth and heaven quake.\nIf others think you are insignificant,\nthat's because you haven't held on long enough.\nAs long as you stay put year after year,\neventually you will find a world\nbeginning to revolve around you.", attribution:"Ha Jin" },
  { type:"poem", title:"The Uses of Sorrow", body:"Someone I loved once gave me\na box full of darkness.\n\nIt took me years to understand\nthat this, too, was a gift.", attribution:"Mary Oliver" },
  { type:"poem", title:"Remember", body:"Remember the sky that you were born under,\nknow each of the star's stories.\nRemember the moon, know who she is.\nRemember the sun's birth at dawn, that is the\nstrongest point of time. Remember sundown\nand the giving away to night.\nRemember your birth, how your mother struggled\nto give you form and breath. You are evidence of\nher life, and her mother's, and hers.\nRemember your father. He is your life, also.\nRemember the earth whose skin you are:\nred earth, black earth, yellow earth, white earth\nbrown earth, we are earth.\nRemember the plants, trees, animal life who all have their\ntribes, their families, their histories, too. Talk to them,\nlisten to them. They are alive poems.\nRemember the wind. Remember her voice. She knows the\norigin of this universe.\nRemember you are all people and all people\nare you.\nRemember you are this universe and this\nuniverse is you.\nRemember all is in motion, is growing, is you.\nRemember language comes from this.\nRemember the dance language is, that life is.\nRemember.", attribution:"Joy Harjo" },
  { type:"poem", title:"Red Brocade", body:"The Arabs used to say,\nWhen a stranger appears at your door,\nfeed him for three days\nbefore asking who he is,\nwhere he's come from,\nwhere he's headed.\nThat way, he'll have strength\nenough to answer.\nOr, by then you'll be\nsuch good friends\nyou don't care.\n\nLet's go back to that.\nRice? Pine nuts?\nHere, take the red brocade pillow.\nMy child will serve water\nto your horse.\n\nNo, I was not busy when you came!\nI was not preparing to be busy.\nThat's the armor everyone put on\nto pretend they had a purpose\nin the world.\n\nI refuse to be claimed.\nYour plate is waiting.\nWe will snip fresh mint\ninto your tea.", attribution:"Naomi Shihab Nye" },
  { type:"poem", title:"Starlings in Winter", body:"Chunky and noisy,\nbut with stars in their black feathers,\nthey spring from the telephone wire\nand instantly\nthey are acrobats\nin the freezing wind.\nAnd now, in the theater of air,\nthey swing over buildings,\ndipping and rising;\nthey float like one stippled star\nthat opens,\nbecomes for a moment fragmented,\nthen closes again;\nand you watch\nand you try\nbut you simply can't imagine\nhow they do it\nwith no articulated instruction, no pause,\nonly the silent confirmation\nthat they are this notable thing,\nthis wheel of many parts, that can rise and spin\nover and over again,\nfull of gorgeous life.\nAh, world, what lessons you prepare for us,\neven in the leafless winter,\neven in the ashy city.\nI am thinking now\nof grief, and of getting past it;\nI feel my boots\ntrying to leave the ground,\nI feel my heart\npumping hard. I want\nto think again of dangerous and noble things.\nI want to be light and frolicsome.\nI want to be improbable beautiful and afraid of nothing,\nas though I had wings.", attribution:"Mary Oliver" },
  { type:"quote", body:"The very least you can do in your life is figure out what you hope for. And the most you can do is live inside that hope. Not admire it from a distance but live right in it, under its roof.", attribution:"Barbara Kingsolver" },
  { type:"quote", body:"Keep a little fire burning; however small, however hidden.", attribution:"Cormac McCarthy" },
  { type:"quote", body:"There is a crack in everything. That's how the light gets in.", attribution:"Leonard Cohen" },
  { type:"song", url:"https://open.spotify.com/track/4UxJfZyHENxiSp60UzTGLW" },
  { type:"song", url:"https://open.spotify.com/track/29MnyydjwSuj8ZodH7tK7r" },
  { type:"song", url:"https://open.spotify.com/track/7vMxPKp4xh7Ii6lQqL6BOS" },
  { type:"song", url:"https://open.spotify.com/track/5CtlTs95X94cWRqbY1nLuM" },
  { type:"song", url:"https://open.spotify.com/track/0Psz3az3RIYfJpnsajBT8N" },
  { type:"song", url:"https://open.spotify.com/track/72tmtay9VtSn8BAynFWWyC" },
  { type:"song", url:"https://open.spotify.com/track/66RsC3VzFhBPwMtjVXvle0" },
  { type:"song", url:"https://open.spotify.com/track/45c2puZgmaC23MaKgeHda2" },
  { type:"song", url:"https://open.spotify.com/track/08HR9PoLSeovgXWvJEZrvi" },
  { type:"song", url:"https://open.spotify.com/track/3I6cO7rHpDUKOrsjzOHwhi" },
  { type:"song", url:"https://open.spotify.com/track/5PRdzrncmga9ieUFVrlE41" },
  { type:"song", url:"https://open.spotify.com/track/2GLN3KJjmFhXG8mHGr6II0" },
  { type:"song", url:"https://open.spotify.com/track/7x6hO9VMAee9x1iWaeNkL6" },
  { type:"song", url:"https://open.spotify.com/track/1c9ZZvFtpbpnWZPLX3ebh3" },
  { type:"song", url:"https://open.spotify.com/track/6jeIbpsYPF0CTId7QrLLer" },
  { type:"song", url:"https://open.spotify.com/track/6aR20F8CYHrvBPjMtwS2gL" },
  { type:"song", url:"https://open.spotify.com/track/2GOQVqZ3uVp7LKVAY1T0mk" },
  { type:"song", url:"https://open.spotify.com/track/7oqftogUN82Q7VNy2TmTJW" },
];

const KEY = "dailyDraw.v1";

function todayStamp() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function shuffledIndexes(n) {
  const a = Array.from({length:n}, (_,i)=>i);
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {}
}

function entryForToday() {
  let s = loadState();
  if (s.size !== ENTRIES.length) s = {};
  if (s.date === todayStamp() && typeof s.todayIndex === "number") {
    return s.todayIndex;
  }
  if (!Array.isArray(s.deck) || s.deck.length === 0) {
    s.deck = shuffledIndexes(ENTRIES.length);
  }
  const todayIndex = s.deck.shift();
  saveState({ size: ENTRIES.length, date: todayStamp(), todayIndex, deck: s.deck });
  return todayIndex;
}

const LABEL = { song:"The Crystal Ball Says", quote:"The Crystal Ball Says", poem:"The Crystal Ball Says" };

const orb = document.getElementById("orb");
const windowEl = document.getElementById("window");
const card = document.getElementById("card");
const kindEl = document.getElementById("kind");
const introEl = document.getElementById("intro");
const bodyEl = document.getElementById("cardBody");
const attrEl = document.getElementById("attribution");
const listenEl = document.getElementById("listen");
const footnote = document.getElementById("footnote");
const replayBtn = document.getElementById("replay");

let animating = false;

function playReveal() {
  if (animating) return;
  animating = true;

  const idx = entryForToday();
  const entry = ENTRIES[idx];

  card.classList.remove("show");
  orb.classList.add("spinning");
  windowEl.style.opacity = "0";

  setTimeout(() => {
    kindEl.textContent = LABEL[entry.type] || "Today";
    card.setAttribute("data-type", entry.type);

    if (entry.type === "song") {
      introEl.textContent = "Today's gift is in the form of a song.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "0";
      bodyEl.innerHTML = "";
      bodyEl.style.display = "none";
      attrEl.style.display = "none";
      if (entry.url) {
        listenEl.href = entry.url;
        listenEl.style.display = "inline-block";
      } else {
        listenEl.style.display = "none";
      }
    } else if (entry.type === "poem") {
      introEl.textContent = "Today's gift is in the form of a poem.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "1.4rem";
      bodyEl.style.display = "block";
      bodyEl.innerHTML = (entry.body || "").replace(/\n/g, "<br>");
      attrEl.innerHTML = entry.attribution ? "<strong>— " + entry.attribution + "</strong>" : "";
      attrEl.style.display = entry.attribution ? "block" : "none";
      listenEl.style.display = "none";
    } else {
      introEl.textContent = "Today's gift is in the form of a quote.";
      introEl.style.display = "block";
      introEl.style.marginBottom = "1.4rem";
      bodyEl.style.display = "block";
      bodyEl.innerHTML = entry.body ? "\u201C" + entry.body.replace(/\n/g, "<br>") + "\u201D" : "";
      attrEl.innerHTML = entry.attribution ? "<strong>— " + entry.attribution + "</strong>" : "";
      attrEl.style.display = entry.attribution ? "block" : "none";
      listenEl.style.display = "none";
    }

    card.classList.add("show");
    windowEl.textContent = "✦";
    windowEl.style.opacity = "1";
    footnote.textContent = "Come back tomorrow for the next one.";
    replayBtn.hidden = false;
  }, 1000);

  setTimeout(() => {
    orb.classList.remove("spinning");
    animating = false;
  }, 1000);
}

orb.addEventListener("pointerenter", playReveal);
orb.addEventListener("click", playReveal);
orb.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); playReveal(); }
});
replayBtn.addEventListener("click", playReveal);
</script>
</body>
</html>
